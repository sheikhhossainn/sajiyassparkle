<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sajiyas Sparkle - Admin Orders">
    <title>Sajiyas Sparkle | Orders</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin-products.css">
    <link rel="stylesheet" href="../css/admin-orders.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <span class="sidebar-header-title">Admin Panel</span>
            </div>

            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="3" width="7" height="7" stroke="currentColor" stroke-width="2" />
                        <rect x="14" y="3" width="7" height="7" stroke="currentColor" stroke-width="2" />
                        <rect x="14" y="14" width="7" height="7" stroke="currentColor" stroke-width="2" />
                        <rect x="3" y="14" width="7" height="7" stroke="currentColor" stroke-width="2" />
                    </svg>
                    Dashboard
                </a>
                <a href="admin-products.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" />
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" />
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" />
                    </svg>
                    Products
                </a>
                <a href="admin-orders.html" class="sidebar-link active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
                        <line x1="8" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="8" y1="13" x2="16" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="8" y1="17" x2="12" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Orders
                </a>
                <a href="admin-customers.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Customers
                </a>
                <a href="admin-admins.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Manage Admins
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="../index.html" class="sidebar-link sidebar-logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2" />
                        <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="2" />
                        <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" />
                    </svg>
                    Logout
                </a>
            </div>
        </aside>

        <main class="admin-main">
            <div class="content-wrapper">
                <div class="container">
                    <div class="admin-page-header">
                        <div class="admin-page-title-wrap">
                            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2" />
                                    <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2" />
                                    <line x1="3" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2" />
                                </svg>
                            </button>
                            <h1 class="page-title">View Orders</h1>
                        </div>
                        <p class="admin-page-subtitle">Every order with customer, items, date, delivery address, and status.</p>
                    </div>

                    <section class="content-section">
                        <div class="orders-stats-grid">
                            <article class="orders-stat-card"><p>Pending</p><h3 id="ordersPendingCount">0</h3></article>
                            <article class="orders-stat-card"><p>Delivered</p><h3 id="ordersDeliveredCount">0</h3></article>
                            <article class="orders-stat-card"><p>Completed</p><h3 id="ordersCompletedCount">0</h3></article>
                            <article class="orders-stat-card"><p>Total</p><h3 id="ordersTotalCount">0</h3></article>
                        </div>
                    </section>

                    <section class="content-section">
                        <div class="card">
                            <div class="card-header">
                                <h2 class="card-title">Order Stream</h2>
                                <p class="card-subtitle">Grouped by order, newest first.</p>
                            </div>
                            <div class="card-body">
                                <div id="ordersCardsContainer" class="orders-cards-grid">
                                    <div class="orders-loading">Loading orders...</div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../js/admin-orders.js"></script>
</body>

</html>
