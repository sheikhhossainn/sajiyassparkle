<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sajiyas Sparkle | Customers</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">

    <!-- CSS Files -->
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin-products.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        .customers-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .customers-table th,
        .customers-table td {
            padding: 0.85rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--color-border);
            vertical-align: middle;
        }
        .customers-table thead th {
            background-color: var(--color-neutral-light);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-neutral-medium);
        }
        .customers-table tbody tr:hover {
            background-color: #fafafa;
        }
        .customers-table tbody tr:last-child td {
            border-bottom: none;
        }
        .customer-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--color-accent-gold);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            flex-shrink: 0;
            margin-right: 0.6rem;
        }
        .customer-name-cell {
            display: flex;
            align-items: center;
        }
        .badge-email {
            display: inline-block;
            background: #f1f5f9;
            color: #475569;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 0.8rem;
        }
        .customers-search-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        .customers-search-bar input {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .customers-search-bar input:focus {
            border-color: var(--color-accent-gold);
        }
        .customers-count {
            font-size: 0.85rem;
            color: var(--color-neutral-medium);
            white-space: nowrap;
        }
        .no-customers {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--color-neutral-medium);
        }
        .no-customers svg {
            margin-bottom: 0.75rem;
            opacity: 0.4;
        }
    </style>
</head>

<body>
    <div class="admin-layout">

        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <span class="sidebar-header-title">Admin Panel</span>
            </div>

            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="3" width="7" height="7" stroke="currentColor" stroke-width="2" />
                        <rect x="14" y="3" width="7" height="7" stroke="currentColor" stroke-width="2" />
                        <rect x="14" y="14" width="7" height="7" stroke="currentColor" stroke-width="2" />
                        <rect x="3" y="14" width="7" height="7" stroke="currentColor" stroke-width="2" />
                    </svg>
                    Dashboard
                </a>
                <a href="admin-products.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" />
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" />
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" />
                    </svg>
                    Products
                </a>
                <a href="admin-orders.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
                        <line x1="8" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="8" y1="13" x2="16" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="8" y1="17" x2="12" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Orders
                </a>
                <a href="admin-messages.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Messages
                </a>
                <a href="admin-customers.html" class="sidebar-link active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Customers
                </a>
                <a href="admin-admins.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Manage Admins
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="../index.html" class="sidebar-link sidebar-logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2" />
                        <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="2" />
                        <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" />
                    </svg>
                    Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="content-wrapper">
                <div class="container">

                    <!-- Customers Table Section -->
                    <section class="content-section">
                        <div class="card">
                            <div class="card-header">
                                <h2 class="card-title">All Customers</h2>
                                <p class="card-subtitle" id="customersCountLabel">Loading...</p>
                            </div>
                            <div class="card-body">
                                <div class="customers-search-bar">
                                    <input type="text" id="customerSearch" placeholder="Search by name or email..." />
                                    <span class="customers-count" id="customersShownCount"></span>
                                </div>
                                <div style="overflow-x: auto;">
                                    <table class="customers-table">
                                        <thead>
                                            <tr>
                                                <th>Customer Name</th>
                                                <th>Email</th>
                                                <th>Phone Number</th>
                                                <th>Address</th>
                                                <th>Joined</th>
                                            </tr>
                                        </thead>
                                        <tbody id="customersTableBody">
                                            <tr>
                                                <td colspan="5" style="text-align:center; padding: 2rem; color: var(--color-neutral-medium);">
                                                    Loading customers...
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </section>

                </div>
            </div>
        </main>

    </div>

    <script type="module" src="../js/admin-customers.js"></script>
</body>

</html>
