<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sajiyas Sparkle - Manage Admins">
    <title>Sajiyas Sparkle | Admin Management</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin-products.css">
    <link rel="stylesheet" href="../css/admin-dashboard.css">
    <!-- Inline styles for admin management -->
    <style>
        .admin-card {
            background: white;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
        }
        .admin-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        .admin-avatar {
            width: 48px;
            height: 48px;
            background: var(--color-neutral-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--color-neutral-medium);
        }
        .admin-details h4 {
            margin: 0;
            font-size: 1rem;
            color: var(--color-primary);
        }
        .admin-details p {
            margin: 0;
            font-size: 0.875rem;
            color: var(--color-neutral-medium);
        }
        .admin-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 10px;
        }
        .badge-super {
            background-color: #fef3c7;
            color: #d97706;
        }
        .badge-regular {
            background-color: #e0f2fe;
            color: #0284c7;
        }
        .add-admin-section {
            background: white;
            padding: var(--spacing-xl);
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            margin-bottom: var(--spacing-xl);
        }
        .add-admin-form {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-md);
        }
        .add-admin-form input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
        }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <span class="sidebar-header-title">Admin Panel</span>
            </div>

            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="3" width="7" height="7" stroke="currentColor" stroke-width="2" />
                        <rect x="14" y="3" width="7" height="7" stroke="currentColor" stroke-width="2" />
                        <rect x="14" y="14" width="7" height="7" stroke="currentColor" stroke-width="2" />
                        <rect x="3" y="14" width="7" height="7" stroke="currentColor" stroke-width="2" />
                    </svg>
                    Dashboard
                </a>
                <a href="admin-products.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" />
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" />
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" />
                    </svg>
                    Products
                </a>
                <a href="admin-orders.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
                        <line x1="8" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="8" y1="13" x2="16" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="8" y1="17" x2="12" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Orders
                </a>
                <a href="admin-customers.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Customers
                </a>
                <a href="admin-admins.html" class="sidebar-link active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Make Admins
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="../index.html" class="sidebar-link sidebar-logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2" />
                        <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="2" />
                        <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" />
                    </svg>
                    Logout
                </a>
            </div>
        </aside>

        <main class="admin-main">
            <div class="content-wrapper">
                <div class="container">
                    <div class="admin-page-header">
                        <div class="admin-page-title-wrap">
                            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2" />
                                    <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2" />
                                    <line x1="3" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2" />
                                </svg>
                            </button>
                            <h1 class="page-title">Manage Admins</h1>
                        </div>
                        <p class="admin-page-subtitle">Manage administrative access (Only for Super Admins)</p>
                    </div>

                    <div id="superAdminControls" class="add-admin-section" style="display: none;">
                        <h3>Add New Admin</h3>
                        <p class="text-sm text-neutral-medium">You can add up to 2 additional admins. They will have full access to management tools but cannot remove you.</p>
                        <form id="addAdminForm" class="add-admin-form">
                            <input type="email" id="newAdminEmail" placeholder="Enter user's email address" required>
                            <button type="submit" class="btn btn-primary">Make Admin</button>
                        </form>
                        <div id="addAdminMessage" style="margin-top: 10px; font-size: 0.9rem;"></div>
                    </div>

                    <div id="adminsList">
                        <!-- Admin list populated by JS -->
                        <div style="text-align: center; padding: 2rem;">Loading admins...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../js/admin-admins.js"></script>
</body>
</html>
